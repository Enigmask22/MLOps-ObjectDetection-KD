# =============================================================================
# GitHub Actions - CD Pipeline
# =============================================================================
# Kích hoạt: Khi CI thành công trên nhánh main
# Giai đoạn: Deploy lên EKS với Rolling Update
# Lưu ý: Cần cấu hình GitHub Secrets:
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY

name: CD Pipeline - Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI Pipeline - Lint, Test & Build"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER: mlops-inference-cluster
  K8S_NAMESPACE: mlops-production
  DOCKER_REGISTRY: ghcr.io

jobs:
  deploy:
    name: Triển khai lên Kubernetes (EKS)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Kiểm tra AWS Credentials đã cấu hình
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::warning::AWS credentials chưa được cấu hình. Bỏ qua CD pipeline."
            echo "Hướng dẫn: Settings → Secrets → Actions → New repository secret"
            echo "  - AWS_ACCESS_KEY_ID"
            echo "  - AWS_SECRET_ACCESS_KEY"
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
          fi

      - name: Checkout mã nguồn
        if: env.SKIP_DEPLOY != 'true'
        uses: actions/checkout@v4

      - name: Cấu hình AWS Credentials
        if: env.SKIP_DEPLOY != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cập nhật kubeconfig cho EKS
        if: env.SKIP_DEPLOY != 'true'
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Cài đặt kubectl
        if: env.SKIP_DEPLOY != 'true'
        uses: azure/setup-kubectl@v4

      - name: Chuẩn bị tên image (lowercase)
        if: env.SKIP_DEPLOY != 'true'
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/mlops-detection" >> "$GITHUB_OUTPUT"

      - name: Triển khai Kubernetes manifests
        if: env.SKIP_DEPLOY != 'true'
        run: |
          # Thay thế tag image trong deployment
          export IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          export IMAGE_NAME=${{ steps.image.outputs.name }}
          envsubst < infrastructure/kubernetes/deployment.yaml | kubectl apply -f -
          kubectl apply -f infrastructure/kubernetes/pvc.yaml
          kubectl apply -f infrastructure/kubernetes/service.yaml
          kubectl apply -f infrastructure/kubernetes/hpa.yaml

      - name: Chờ Rolling Update hoàn tất
        if: env.SKIP_DEPLOY != 'true'
        run: |
          kubectl rollout status deployment/mlops-detection \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Xác minh triển khai
        if: env.SKIP_DEPLOY != 'true'
        run: |
          echo "### Trạng thái triển khai" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=mlops-detection >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Kiểm tra Health Check
        if: env.SKIP_DEPLOY != 'true'
        run: |
          # Lấy Service URL
          SERVICE_URL=$(kubectl get svc mlops-detection-service \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Chờ service sẵn sàng
          for i in $(seq 1 30); do
            if curl -sf "http://${SERVICE_URL}/health" > /dev/null 2>&1; then
              echo "Health check thành công!"
              exit 0
            fi
            echo "Đang chờ service... ($i/30)"
            sleep 10
          done
          echo "Health check thất bại sau 5 phút!"
          exit 1

  # --- Terraform Plan (nếu có thay đổi hạ tầng) ---
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    needs: deploy
    steps:
      - name: Kiểm tra AWS Credentials đã cấu hình
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::warning::AWS credentials chưa được cấu hình. Bỏ qua Terraform."
            echo "SKIP_TF=true" >> $GITHUB_ENV
          fi

      - name: Checkout mã nguồn
        if: env.SKIP_TF != 'true'
        uses: actions/checkout@v4

      - name: Cài đặt Terraform
        if: env.SKIP_TF != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Cấu hình AWS Credentials
        if: env.SKIP_TF != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        if: env.SKIP_TF != 'true'
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Plan
        if: env.SKIP_TF != 'true'
        working-directory: infrastructure/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply (auto-approve trên main)
        if: env.SKIP_TF != 'true'
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan
